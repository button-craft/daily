<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUTTON Daily</title>
<script>
  // If this page was reached without a trailing slash (e.g. .../daily instead of
  // .../daily/), fix the URL BEFORE any relative resources (CSS/JS/JSON) are
  // requested. Without this, GitHub Pages still serves this HTML for the bare path,
  // but the browser resolves script.js / data/messages.json against the wrong
  // parent folder, causing silent 404s and an infinite "loading…" with no visible error.
  (function () {
    const path = window.location.pathname;
    const isFile = path.split('/').pop().includes('.');
    if (!path.endsWith('/') && !isFile) {
      window.location.replace(window.location.href + '/');
    }
  })();
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <div class="brand">BUTTON Daily</div>
  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="daily">Daily</button>
    <button class="mode-btn" data-mode="free">Free Play</button>
  </div>
  <div class="streak" id="streak"></div>
  <div class="session-tally" id="sessionTally"></div>

  <div class="puzzle" id="puzzle">
    <div class="timestamp" id="timestamp">loading…</div>

    <div class="bubble-row">
      <div class="bubble" id="bubble">…</div>
    </div>

    <div class="options" id="options"></div>

    <div class="result" id="result"></div>

    <button class="next-btn hidden" id="nextBtn">Next →</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
